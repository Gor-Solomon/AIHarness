# SonarQube Quality Gate Configuration
# Owner: Platform Engineering
# This file defines the "Stop-the-Line" metrics. Even if tests pass, 
# if the coverage drops below the 90% threshold for Tier 3 code, the PR is blocked.

sonar.projectKey=AIHarness_PaymentsSystem
sonar.projectName=PaymentsSystem
sonar.sources=src
sonar.tests=tests
sonar.language=cs
sonar.dotnet.excludeTestProjects=true

# Quality Gate: Mandatory Coverage
sonar.coverage.exclusions=**/*.csproj,**/Migrations/**
sonar.javascript.node.declarationFiles=true
sonar.qualitygate.wait=true
sonar.qualitygate.status=OK
sonar.qualitygate.conditions=[{"metric":"line_coverage", "operator":"LT", "error":"90"}]
