# SonarQube Scanner Configuration Framework Data File
sonar.host.url=https://sonarcloud.io
sonar.organization=vg-recruiting-agency-production-nodes
sonar.projectKey=company-payments-api-service
sonar.projectName=Payments API Core Service Architecture
sonar.projectVersion=1.0.0

# Targeting Code Coverage Paths
sonar.sources=src/
sonar.tests=tests/
sonar.language=cs
sonar.sourceEncoding=UTF-8

# Mapping Data to Code Coverage Output generated by Coverlet Engine
sonar.cs.opencover.reportsPaths=./TestResults/coverage.xml        

# Unyielding Quality Gate Failure Metrics
sonar.qualitygate.wait=true
sonar.qualitygate.conditions.coverage.min=90.0
sonar.qualitygate.conditions.duplicated_lines_density.max=3.0
