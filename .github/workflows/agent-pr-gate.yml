name: Enterprise AI Gatekeeper

on:
  pull_request:
    branches: [ "main" ]

jobs:
  validate-dotnet-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Run Backend Tests
        run: dotnet test /p:CollectCoverage=true /p:CoverletOutputFormat=opencover

  validate-typescript-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js Runtime Environment
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Frontend Dependencies
        run: |
          cd src/mobile-app
          npm ci

      - name: Run Strict TypeScript Type Compilation Verification
        run: |
          cd src/mobile-app
          npx tsc --noEmit
